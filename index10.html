<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Simulateur de Cyclone Tropical | NESDIS Style</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; font-family: 'Arial', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 25px; box-sizing: border-box; z-index: 10; }
        .panel { pointer-events: auto; background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .controls-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .label { font-weight: bold; font-size: 16px; color: #1a5f7a; margin-bottom: 5px; }
        .sub-label { font-size: 14px; color: #444; margin-bottom: 10px; }
        
        input[type="range"] { -webkit-appearance: none; width: 250px; height: 6px; background: #d1d5db; border-radius: 50px; outline: none; margin-bottom: 20px; pointer-events: auto; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #00bcd4; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        .btn { pointer-events: auto; border: none; border-radius: 6px; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.3s; }
        #go-btn { background-color: #00bcd4; padding: 12px 40px; color: #fff; }
        #go-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #reset-btn { background-color: #e0f7fa; padding: 8px 20px; font-size: 16px; position: absolute; bottom: 30px; right: 30px; border: 1px solid #00bcd4; }

        #status-box { position: absolute; bottom: 30px; left: 30px; width: 350px; }
        #stage-title { font-size: 14px; font-weight: bold; color: #555; text-transform: uppercase; }
        #stage-name { font-size: 28px; font-weight: bold; color: #008b8b; margin: 5px 0; }
        #stage-desc { font-size: 13px; color: #666; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <div class="controls-top">
            <div class="panel">
                <div class="label">Pression atmosphérique</div>
                <div class="sub-label"><span id="press-control-val">1013</span> hPa</div>
                <input type="range" id="press-slider" min="900" max="1013" value="1013">
                
                <div class="label">Température de l'eau</div>
                <div class="sub-label"><span id="temp-val">28</span>°C (Seuil : 26.5°C)</div>
                <input type="range" id="temp-slider" min="20" max="35" step="0.5" value="28">
            </div>
            
            <div style="text-align: right;">
                <div class="panel">
                    <div class="label">Diamètre : <span id="diam-display-val">125</span> miles</div>
                    <div class="label">Vents : <span id="speed-val">0</span> km/h</div>
                </div>
                <br><br>
                <button class="btn" id="go-btn">LANCER LE CYCLONE</button>
            </div>
        </div>

        <div id="status-box" class="panel">
            <div id="stage-title">Étape de développement</div>
            <p id="stage-name">Calme</p>
            <p id="stage-desc">L'eau est trop froide pour alimenter un système.</p>
        </div>
        
        <button class="btn" id="reset-btn">Réinitialiser</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, cyclone;
        let house, land;
        let isActive = false;
        let rotationDirection = -1;

        const STAGES = [
            { name: "Inactif", minSpeed: 0, desc: "La température est inférieure à 26.5°C. Pas assez d'énergie." },
            { name: "Perturbation", minSpeed: 1, desc: "L'air chaud monte et crée des amas de nuages d'orage." },
            { name: "Dépression", minSpeed: 40, desc: "La pression chute. Vents entre 40 et 61 km/h." },
            { name: "Tempête", minSpeed: 63, desc: "Le système reçoit un nom. L'œil commence à se former." },
            { name: "Cyclone", minSpeed: 119, desc: "Stade ultime. Vents violents et structure massive." }
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xb2ebf2);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(180, 100, 250);
            camera.lookAt(0, 40, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            const seaGeo = new THREE.PlaneGeometry(1000, 2000);
            const seaMat = new THREE.MeshStandardMaterial({ color: 0x0077be });
            const sea = new THREE.Mesh(seaGeo, seaMat);
            sea.rotation.x = -Math.PI / 2;
            sea.position.set(-450, 0, 0);
            scene.add(sea);

            const landGeo = new THREE.PlaneGeometry(1000, 2000);
            const landMat = new THREE.MeshStandardMaterial({ color: 0x7cb342 });
            land = new THREE.Mesh(landGeo, landMat);
            land.rotation.x = -Math.PI / 2;
            land.position.set(550, 0.1, 0);
            scene.add(land);

            house = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(25, 15, 25), new THREE.MeshStandardMaterial({color: 0xfff9c4}));
            body.position.y = 7.5;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(22, 12, 4), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            roof.position.y = 21;
            roof.rotation.y = Math.PI/4;
            house.add(body, roof);
            house.position.set(150, 0, 0);
            scene.add(house);

            cyclone = new THREE.Group();
            for(let i=0; i<20; i++) {
                const r = 5 + i * 4;
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(r, 1.5, 8, 20),
                    new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.6})
                );
                ring.position.y = i * 6;
                ring.rotation.x = Math.PI/2;
                cyclone.add(ring);
            }
            cyclone.position.set(-250, 0, 0);
            scene.add(cyclone);

            setup();
            animate();
        }

        function setup() {
            const pS = document.getElementById('press-slider');
            const tS = document.getElementById('temp-slider');
            const goB = document.getElementById('go-btn');
            const resB = document.getElementById('reset-btn');

            const updatePhys = () => {
                const t = parseFloat(tS.value);
                const p = parseInt(pS.value);
                document.getElementById('temp-val').innerText = t;
                document.getElementById('press-control-val').innerText = p;

                let speed = 0;
                let diam = 125;

                if(t >= 26.5) {
                    speed = ((1013 - p) * 1.5) + (t - 26.5) * 10;
                    diam = 50 + (1013 - p) * 2;
                }
                
                document.getElementById('speed-val').innerText = Math.round(speed);
                document.getElementById('diam-display-val').innerText = Math.round(diam);

                let currentStage = STAGES[0];
                for(let s of STAGES) {
                    if(speed >= s.minSpeed) currentStage = s;
                }
                document.getElementById('stage-name').innerText = currentStage.name;
                document.getElementById('stage-desc').innerText = currentStage.desc;

                const scale = diam / 125;
                cyclone.scale.set(scale, 1, scale);
                cyclone.visible = (speed > 5);
            };

            tS.oninput = updatePhys;
            pS.oninput = updatePhys;
            goB.onclick = () => { isActive = true; goB.disabled = true; };
            resB.onclick = () => {
                isActive = false;
                cyclone.position.x = -250;
                house.position.set(150, 0, 0);
                house.rotation.set(0,0,0);
                goB.disabled = false;
                tS.value = 28;
                pS.value = 1013;
                updatePhys();
                // Reset opacities
                cyclone.children.forEach(r => r.material.opacity = 0.6);
            };
            updatePhys();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(cyclone.visible) {
                let s = parseFloat(document.getElementById('speed-val').innerText);
                let p = parseInt(document.getElementById('press-control-val').innerText);
                let d = parseInt(document.getElementById('diam-display-val').innerText);

                cyclone.children.forEach((r, i) => {
                    r.rotation.z += (0.05 + i*0.005) * (s/100) * rotationDirection;
                });

                if(isActive) {
                    cyclone.position.x += 1;
                    
                    // GESTION DU CONTACT AVEC LA TERRE (X > 50)
                    if(cyclone.position.x > 50) {
                        // 1. Les vents faiblissent
                        if(s > 15) {
                            s -= 0.5;
                            document.getElementById('speed-val').innerText = Math.round(s);
                        }

                        // 2. La pression remonte vers la normale (1013)
                        if(p < 1013) {
                            p += 1;
                            document.getElementById('press-control-val').innerText = p;
                            document.getElementById('press-slider').value = p;
                        }

                        // 3. Le diamètre diminue
                        if(d > 40) {
                            d -= 0.8;
                            document.getElementById('diam-display-val').innerText = Math.round(d);
                            const scale = d / 125;
                            cyclone.scale.set(scale, 1, scale);
                        }

                        // 4. Le cyclone devient plus transparent (dissipation)
                        cyclone.children.forEach(r => {
                            if(r.material.opacity > 0.1) r.material.opacity -= 0.002;
                        });
                    }

                    // Interaction avec la maison
                    const dist = cyclone.position.distanceTo(house.position);
                    if(dist < 60 && s > 60) {
                        house.position.y += 1;
                        house.rotation.x += 0.1;
                        house.position.x += 0.5;
                    }
                }
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
